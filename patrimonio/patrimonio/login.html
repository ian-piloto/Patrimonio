<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Patrimônio SENAI</title>
    <!-- Fontes Premium: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-body">

    <div class="login-container glass-panel">
        <div class="login-header">
            <!-- Simulação de um logo do SENAI -->
            <div class="logo-senai">
                <span class="logo-s">S</span>ENAI
            </div>
            <h2>Gestão de Patrimônio</h2>
            <p>Entre com suas credenciais de professor</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" name="email" required placeholder="ex: professor@senai.br">
            </div>

            <div class="form-group" style="position: relative;">
                <label for="senha">Senha</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="senha" name="senha" required placeholder="••••••••" style="padding-right: 40px; width: 100%;">
                    <button type="button" id="togglePassword" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: #a0aec0; display: flex; align-items: center; justify-content: center; padding: 0; outline: none;" title="Mostrar Senha">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off" style="display: none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btnLogin">Entrar no Sistema</button>
            <div class="form-messages" id="loginMessage"></div>
        </form>
    </div>
    <!-- Scripts -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('senha');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    if (type === 'text') {
                        eyeIcon.style.display = 'none';
                        eyeOffIcon.style.display = 'block';
                        togglePassword.setAttribute('title', 'Ocultar Senha');
                    } else {
                        eyeIcon.style.display = 'block';
                        eyeOffIcon.style.display = 'none';
                        togglePassword.setAttribute('title', 'Mostrar Senha');
                    }
                });
            }
        });
    </script>
</body>

</html>
